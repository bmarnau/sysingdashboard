name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: RBAC matrix check
        run: bun run rbac:check

      - name: No-console guard
        run: bun run lint:no-console

      - name: Docs sync check
        run: bun run docs:check

      - name: Test (with coverage)
        run: bun run test:coverage

      - name: Security suite (Vitest + scanners)
        run: bun run test:security

      - name: Security report
        if: always()
        run: bun run security:report

      - name: Security release gate
        run: bun run security:gate

      - name: API endpoint contract tests
        run: bun run test:api

      - name: Restore previous tech-debt report (Diff-Basis)
        uses: actions/cache@v4
        with:
          path: test-report/tech-debt.prev.json
          key: tech-debt-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            tech-debt-${{ github.ref_name }}-
            tech-debt-main-

      - name: Tech-debt report
        run: bun run test:debt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: bun run test:e2e

      - name: Generate E2E report
        if: always()
        run: bun run test:e2e:report

      - name: Build (production)
        run: bun run build

      - name: Bundle report
        run: bun run test:perf

      - name: Aggregate test report
        if: always()
        run: bun run test:report

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: Upload test-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report/

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
